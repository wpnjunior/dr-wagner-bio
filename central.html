<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>Central</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2288%22>🔐</text></svg>">
<style>
:root{--bg:#0a1016;--surf:#101a22;--surf2:#0c141b;--line:rgba(99,216,203,.16);--teal:#63d8cb;--gold:#f0c45c;--ink:#eef3f0;--soft:#9fb0b4;--red:#ff6b6b;--grn:#57d38a;--yel:#f0c45c}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#0c151b,#060b10);color:var(--ink);font:16px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh}
a{color:inherit}
/* GATE */
#gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.brand{font:700 30px/1 Georgia,serif}.brand small{color:var(--teal)}
#gate h1{font-size:17px;font-weight:600;color:var(--soft);margin:14px 0 22px}
#gate input{width:min(340px,86vw);padding:13px 16px;border-radius:12px;border:1px solid var(--line);background:var(--surf);color:var(--ink);font-size:16px;text-align:center;letter-spacing:2px}
#gate button{margin-top:12px;width:min(340px,86vw);padding:12px;border:0;border-radius:12px;background:var(--teal);color:#04241f;font-weight:700;font-size:15px;cursor:pointer}
#err{color:var(--red);font-size:13px;height:18px;margin-top:10px}
.lock{font-size:44px;margin-bottom:6px}
/* APP */
#app{display:none;max-width:1120px;margin:0 auto;padding:0 14px 60px}
header.top{position:sticky;top:0;background:linear-gradient(180deg,#0c151b,rgba(12,21,27,.86));backdrop-filter:blur(6px);padding:18px 4px 12px;z-index:5}
.tbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.tbar .t{font:700 20px/1 Georgia,serif;margin-right:auto}.tbar .t small{color:var(--teal)}
#q{flex:1;min-width:180px;padding:10px 14px;border-radius:11px;border:1px solid var(--line);background:var(--surf);color:var(--ink);font-size:15px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.chip{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--soft);font-size:13px;cursor:pointer}
.chip.on{background:var(--teal);color:#04241f;border-color:var(--teal);font-weight:700}
.blocks{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.block{background:var(--surf);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.bh{padding:14px 16px;border-bottom:1px solid var(--line)}
.bh h2{margin:0;font-size:18px;display:flex;align-items:center;gap:9px}
.bh p{margin:4px 0 0;color:var(--soft);font-size:13px}
.links{padding:8px 10px 12px}
.lk{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:10px}
.lk:hover{background:var(--surf2)}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.ok{background:var(--grn)}.dot.redirect{background:var(--yel)}.dot.erro{background:var(--red)}.dot.desconhecido{background:#5a6b72}
.lk .lab{flex:1;min-width:0}.lk .lab b{font-weight:600;font-size:14.5px}.lk .lab span{display:block;color:var(--soft);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);border:1px solid var(--line);padding:1px 6px;border-radius:6px}
.act{border:1px solid var(--line);background:transparent;color:var(--teal);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;text-decoration:none}
.act.op{background:var(--teal);color:#04241f;border-color:var(--teal);font-weight:700}
.empty{color:var(--soft);text-align:center;padding:40px}
footer{text-align:center;color:var(--soft);font-size:12px;padding:22px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--gold);color:#241a04;padding:9px 16px;border-radius:10px;font-weight:700;opacity:0;transition:.2s;pointer-events:none}.toast.on{opacity:1}
</style></head><body>

FPfgBkQfTxdV4iA+z/c+3yg9yc", "iters": 100000};
const CATS = {app:'Apps',venda:'Vendas',checkout:'Vendas',admin:'Interno',repo:'Repos',infra:'Repos',material:'Materiais',perfil:'Conteúdo',doc:'Conteúdo',skill:'Skills'};
let INV=null, filtro='Tudo', busca='';
const $=s=>document.querySelector(s);
function b2a(b64){const s=atob(b64);const u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function unlock(pw){
 const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(BLOB.salt),iterations:BLOB.iters,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(BLOB.nonce)},key,b2a(BLOB.ct));
 return JSON.parse(new TextDecoder().decode(pt));
}
async function tryEnter(){
 const pw=$('#pw').value; $('#err').textContent='';
 try{ INV=await unlock(pw); $('#gate').style.display='none'; $('#app').style.display='block'; boot(); }
 catch(e){ $('#err').textContent='Senha incorreta.'; $('#pw').select(); }
}
$('#go').onclick=tryEnter; $('#pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});
function cats(){const s=new Set(['Tudo']);INV.cards.forEach(c=>c.links.forEach(l=>s.add(CATS[l.tipo]||'Outros')));return[...s];}
function boot(){
 $('#gen').textContent=INV.generated||'';
 const cb=$('#chips'); cb.innerHTML='';
 cats().forEach(c=>{const b=document.createElement('button');b.className='chip'+(c==filtro?' on':'');b.textContent=c;b.onclick=()=>{filtro=c;[...cb.children].forEach(x=>x.classList.toggle('on',x.textContent==c));render();};cb.appendChild(b);});
 $('#q').addEventListener('input',e=>{busca=e.target.value.toLowerCase();render();});
 render();
}
function linkRow(l){
 const has=l.url&&/^https?:/.test(l.url);
 const op=has?`<a class="act op" href="${l.url}" target="_blank" rel="noopener">Abrir</a>`:'';
 const cp=has?`<button class="act" onclick="cp('${l.url}',this)">Copiar</button>`:'';
 return `<div class="lk"><span class="dot ${l.status}"></span>
   <span class="lab"><b>${esc(l.label)}</b>${has?`<span>${esc(l.url)}</span>`:''}</span>
   <span class="tag">${l.tipo}</span>${op}${cp}</div>`;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function render(){
 const wrap=$('#blocks');wrap.innerHTML='';let n=0;
 INV.cards.forEach(c=>{
  const links=c.links.filter(l=>{
   const okCat=filtro=='Tudo'||(CATS[l.tipo]||'Outros')==filtro;
   const okBus=!busca||(c.dominio+' '+c.descricao+' '+l.label+' '+l.url).toLowerCase().includes(busca);
   return okCat&&okBus;});
  if(!links.length)return;n++;
  const el=document.createElement('div');el.className='block';
  el.innerHTML=`<div class="bh"><h2>${c.emoji||''} ${esc(c.dominio)}</h2><p>${esc(c.descricao||'')}</p></div>
   <div class="links">${links.map(linkRow).join('')}</div>`;
  wrap.appendChild(el);
 });
 if(!n)wrap.innerHTML='<div class="empty">Nada encontrado.</div>';
}
function cp(u,el){navigator.clipboard.writeText(u).then(()=>{const t=$('#toast');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1200);});}
</script></body></html>
